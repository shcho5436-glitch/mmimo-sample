<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MMIMO 돌잔치 초대장</title>

  <meta property="og:title" content="MMIMO 돌잔치 초대장" />
  <meta property="og:description" content="소중한 첫 생일에 초대합니다." />
  <meta property="og:type" content="website" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff7f0;
      color: #3a2a20;
    }

    .page {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: #fffaf5;
      text-align: center;
      padding-bottom: 60px;
    }

    .hero {
      padding: 60px 24px 30px;
      background: linear-gradient(#ffe6d2, #fffaf5);
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #ffffff;
      font-size: 13px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 30px;
      line-height: 1.35;
      margin: 0 0 12px;
    }

    .subtitle {
      font-size: 16px;
      line-height: 1.7;
      color: #6d5546;
    }

    .baby {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: #ffd7b8;
      margin: 35px auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 70px;
      animation: bounce 1.8s infinite ease-in-out;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-12px);
      }
    }

    .section {
      padding: 32px 24px;
      border-top: 1px solid #f1dfd2;
    }

    .section h2 {
      font-size: 20px;
      margin-bottom: 14px;
    }

    .info {
      line-height: 1.9;
      font-size: 16px;
    }

    .button {
      display: block;
      margin: 18px auto 0;
      width: 80%;
      max-width: 300px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #3a2a20;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .footer {
      font-size: 13px;
      color: #8b7566;
      padding: 30px 24px;
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="badge">1st Birthday Invitation</div>
      <h1>민서의 첫 생일에<br />초대합니다</h1>
      <p class="subtitle">
        소중한 분들을 모시고<br />
        아이의 첫 번째 생일을 함께 나누고 싶습니다.
      </p>

      <div class="baby">👶</div>
    </section>

    <section class="section">
      <h2>초대합니다</h2>
      <p class="info">
        2026년 8월 10일 토요일<br />
        오후 12시 30분<br />
        라움베베 연회장
      </p>
    </section>

    <section class="section">
      <h2>오시는 길</h2>
      <p class="info">
        서울특별시 강남구 예시로 123<br />
        라움베베 3층
      </p>
      <a class="button" href="https://map.naver.com" target="_blank">
        지도 보기
      </a>
    </section>

    <section class="section">
      <h2>마음 전하실 곳</h2>
      <p class="info">
        신한은행 000-000-000000<br />
        예금주 홍길동
      </p>
    </section>

    <div class="footer">
      MMIMO · mobile invitation sample
    </div>
  </main>
</body>
</html>
